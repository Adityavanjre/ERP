server {
    listen ${PORT};

    # Health Check
    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # --------------------------------------------------------
    # 1. Nexus ERP Frontend (Portal)
    # --------------------------------------------------------
    location /portal/ {
        proxy_pass http://${KLYPSO_FRONTEND_HOST}:${KLYPSO_FRONTEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # --------------------------------------------------------
    # 2. Nexus ERP Backend (API)
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://${KLYPSO_BACKEND_HOST}:${KLYPSO_BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # --------------------------------------------------------
    # 3. Agency Viewer (Public Website) - Default Root
    # --------------------------------------------------------
    location / {
        proxy_pass http://${AGENCY_VIEWER_HOST}:${AGENCY_VIEWER_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # --------------------------------------------------------
    # 4. Agency Backend (CMS/Admin API)
    # --------------------------------------------------------
    location /agency-api/ {
        proxy_pass http://${AGENCY_BACKEND_HOST}:${AGENCY_BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
