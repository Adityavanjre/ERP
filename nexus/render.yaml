services:
- type: web
  name: klypso-agency-viewer
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: VITE_API_URL
    value: https://nexus.klypso.in/agency-api/api
    sync: false
  - key: PORT
    sync: false
  region: oregon
  buildCommand: npm install && npm run build
  startCommand: npx serve -s dist -l $PORT
  healthCheckPath: /
  autoDeployTrigger: "off"
  rootDir: agency/client
- type: web
  name: klypso-backend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: KLYPSO_FRONTEND_URL
    sync: false
  - key: SMTP_FROM
    sync: false
  - key: SMTP_PORT
    sync: false
  - key: NEXUS_FRONTEND_URL
    sync: false
  - key: PORT
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: RESEND_API_KEY
    sync: false
  - key: GOOGLE_CLIENT_ID
    sync: false
  - key: CLOUDINARY_CLOUD_NAME
    sync: false
  - key: CLOUDINARY_API_KEY
    sync: false
  - key: CLOUDINARY_API_SECRET
    sync: false
  - key: DATABASE_URL
    sync: false
  region: oregon
  buildCommand: npm install && npx prisma generate && npm run build
  startCommand: npx prisma migrate deploy && node dist/main.js
  healthCheckPath: /api/v1/health/liveness
  autoDeployTrigger: "off"
  rootDir: nexus/backend
- type: web
  name: klypso-gateway
  runtime: docker
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: AGENCY_BACKEND_HOST
    sync: false
  - key: KLYPSO_BACKEND_HOST
    sync: false
  - key: KLYPSO_FRONTEND_HOST
    sync: false
  - key: AGENCY_VIEWER_HOST
    sync: false
  - key: KLYPSO_FRONTEND_URL
    sync: false
  - key: KLYPSO_BACKEND_PORT
    sync: false
  - key: KLYPSO_FRONTEND_PORT
    sync: false
  - key: AGENCY_BACKEND_PORT
    sync: false
  - key: NEXUS_BACKEND_PORT
    sync: false
  - key: NEXUS_BACKEND_HOST
    sync: false
  - key: NEXUS_FRONTEND_PORT
    sync: false
  - key: AGENCY_VIEWER_PORT
    sync: false
  - key: NEXUS_FRONTEND_HOST
    sync: false
  - key: PORT
    sync: false
  region: oregon
  dockerContext: .
  dockerfilePath: ./Dockerfile
  domains:
  - nexus.klypso.in
  - www.klypso.in
  - klypso.in
  autoDeployTrigger: "off"
  rootDir: gateway
- type: web
  name: klypso-frontend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: HOSTNAME
    sync: false
  - key: PORT
    sync: false
  - key: KLYPSO_BACKEND_URL
    sync: false
  - key: NEXT_PUBLIC_API_URL
    value: https://nexus.klypso.in/portal/api
    sync: false
  region: oregon
  buildCommand: npm install && npm run build
  startCommand: npm start
  healthCheckPath: /portal/dashboard
  autoDeployTrigger: "off"
  rootDir: nexus/frontend
- type: web
  name: klypso-agency-backend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: PORT
    sync: false
  - key: MONGO_URI
    sync: false
  region: oregon
  buildCommand: npm install
  startCommand: node index.js
  healthCheckPath: /
  autoDeployTrigger: "off"
  rootDir: agency/server
- type: web
  name: klypso-agency-frontend
  runtime: static
  repo: https://github.com/Adityavanjre/ERP
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  autoDeployTrigger: "off"
  rootDir: agency/client
