services:
  # --------------------------------------------------------------------------------
  # BACKEND SERVICE
  # --------------------------------------------------------------------------------
  - type: web
    name: nexus-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: nexus-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: nexus-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # --------------------------------------------------------------------------------
  # FRONTEND SERVICE
  # --------------------------------------------------------------------------------
  - type: web
    name: nexus-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nexus-backend
          envVarKey: RENDER_EXTERNAL_URL
          value: https://nexus-backend.onrender.com/api # Fallback, usually auto-injected if linked

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus

  - name: nexus-redis
    plan: free
    ipAllowList: [] # Only allow internal access
