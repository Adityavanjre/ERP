<!doctype html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Senior Agency SEO Foundation -->
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <meta name="bingbot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    content="The imperial standard for digital product engineering, custom ERP systems, and enterprise AI automation. We build the infrastructure that powers high-growth businesses." />
  <meta name="keywords"
    content="Elite Software Development India, Custom ERP Engineering, Enterprise AI Implementation, Premium Web Design Agency, Next.js Industrial Development, High-Performance Backend Systems" />

  <meta property="og:title" content="Klypso | Elite Digital Engineering" />
  <meta property="og:description" content="We engineer premium digital products and automated business ecosystems." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://klypso.agency" />
  <meta property="og:image" content="https://klypso.agency/og-image.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Klypso Engineering | Premium ERP & AI" />
  <meta name="twitter:description" content="Transforming businesses with advanced software infrastructure." />
  <meta name="twitter:image" content="https://klypso.agency/og-image.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Klypso",
    "url": "https://klypso.agency",
    "logo": "https://klypso.agency/logo.png",
    "description": "High-performance software engineering agency specializing in Enterprise ERP, AI infrastructure, and custom industrial automation.",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+91-XXXXXXXXXX",
      "contactType": "sales",
      "areaServed": "IN",
      "availableLanguage": "en"
    },
    "sameAs": [
      "https://linkedin.com/company/klypso"
    ]
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "serviceType": "Enterprise ERP Development",
    "provider": {
      "@type": "Organization",
      "name": "Klypso"
    },
    "areaServed": "World",
    "description": "High-end Tally-integrated ERP systems for Indian manufacturing and retail."
  }
  </script>
</head>

<body>
  <!-- Netlify Hidden Form for Static Detection -->
  <form name="contact" netlify hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <select name="service"></select>
    <textarea name="message"></textarea>
  </form>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
