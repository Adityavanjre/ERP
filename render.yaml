services:
  # 🚪 THE FRONT DOOR (Nginx Gateway)
  - type: web
    name: klypso-gateway
    env: docker
    plan: free
    rootDir: gateway
    envVars:
      - key: PORT
        value: 80
      - key: AGENCY_VIEWER_HOST
        value: klypso-agency-viewer.onrender.com
      - key: AGENCY_VIEWER_PORT
        value: 443
      - key: NEXUS_FRONTEND_HOST
        value: nexus-frontend-gz8c.onrender.com
      - key: NEXUS_FRONTEND_PORT
        value: 443
      - key: NEXUS_BACKEND_HOST
        value: nexus-backend-3ukg.onrender.com
      - key: NEXUS_BACKEND_PORT
        value: 443
      - key: AGENCY_BACKEND_HOST
        value: klypso-agency-backend.onrender.com
      - key: AGENCY_BACKEND_PORT
        value: 443

  # --- KLYPSO AGENCY ---
  - type: web
    name: klypso-agency-backend
    env: node
    plan: free
    rootDir: agency/server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5000

  - type: web
    name: klypso-agency-viewer
    env: node
    plan: free
    rootDir: agency/client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: PORT
        value: 5000

  # --- KLYPSO NEXUS ---
  - type: web
    name: nexus-backend
    env: node
    plan: free
    rootDir: nexus/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  - type: web
    name: nexus-frontend
    env: node
    plan: free
    rootDir: nexus/frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: PORT
        value: 3000

databases:
  - name: nexus-db
    plan: free
