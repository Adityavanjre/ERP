services:
  # THE FRONT DOOR (Nginx Gateway)
  - type: web
    name: klypso-gateway
    env: docker
    plan: free
    rootDir: gateway
    autoDeploy: true
    envVars:
      - key: PORT
        value: 80
      - key: AGENCY_VIEWER_HOST
        value: klypso-agency-viewer.onrender.com
      - key: KLYPSO_FRONTEND_HOST
        value: klypso-frontend.onrender.com
      - key: KLYPSO_BACKEND_HOST
        value: nexus-backend-3ukg.onrender.com
      - key: AGENCY_BACKEND_HOST
        value: klypso-agency-backend.onrender.com
      - key: KLYPSO_FRONTEND_URL
        value: https://klypso.in/portal
    domains:
      - klypso.in
      - www.klypso.in

  # --- KLYPSO AGENCY ---
  - type: web
    name: klypso-agency-backend
    env: node
    plan: free
    rootDir: agency/server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false

  - type: web
    name: klypso-agency-viewer
    env: node
    plan: free
    rootDir: agency/client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://klypso.in/agency-api/

  # --- KLYPSO ERP ---
  - type: web
    name: klypso-backend
    env: node
    plan: free
    rootDir: nexus/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health/liveness
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: klypso-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: KLYPSO_FRONTEND_URL
        value: https://klypso.in/portal
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@klypso.in

  - type: web
    name: klypso-frontend
    env: node
    plan: free
    rootDir: nexus/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /portal/dashboard
    autoDeploy: true
    envVars:
      - key: KLYPSO_BACKEND_URL
        value: http://klypso-backend:3001
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0

databases:
  - name: klypso-db
    plan: free
