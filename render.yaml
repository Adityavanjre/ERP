services:
  # 🚪 THE FRONT DOOR (Nginx Gateway)
  - type: web
    name: klypso-gateway
    env: docker
    plan: free
    rootDir: gateway
    envVars:
      - key: PORT
        value: 80
      - key: AGENCY_VIEWER_HOST
        value: klypso-agency-viewer.onrender.com
      - key: AGENCY_VIEWER_PORT
        value: 443
      - key: NEXUS_FRONTEND_HOST
        value: nexus-frontend-gz8c.onrender.com
      - key: NEXUS_FRONTEND_PORT
        value: 443
      - key: NEXUS_BACKEND_HOST
        value: nexus-backend-3ukg.onrender.com
      - key: NEXUS_BACKEND_PORT
        value: 443
      - key: AGENCY_BACKEND_HOST
        value: klypso-agency-backend.onrender.com
      - key: AGENCY_BACKEND_PORT
        value: 443
    domains:
      - klypso.in
      - www.klypso.in

  # --- KLYPSO AGENCY ---
  - type: web
    name: klypso-agency-backend
    env: node
    plan: free
    rootDir: agency/server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false

  - type: web
    name: klypso-agency-viewer
    env: node
    plan: free
    rootDir: agency/client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    healthCheckPath: /

  # --- KLYPSO NEXUS ---
  - type: web
    name: nexus-backend
    env: node
    plan: free
    rootDir: nexus/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/main.js
    healthCheckPath: /api/health/liveness
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: nexus-frontend
    env: node
    plan: free
    rootDir: nexus/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /portal/dashboard
    envVars:
      - key: NEXUS_BACKEND_URL
        value: https://nexus-backend-3ukg.onrender.com

databases:
  - name: nexus-db
    plan: free
