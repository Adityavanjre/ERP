version: "1"
services:
- type: web
  name: klypso-gateway
  runtime: docker
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: AGENCY_BACKEND_HOST
    sync: false
  - key: KLYPSO_BACKEND_HOST
    sync: false
  - key: KLYPSO_FRONTEND_HOST
    sync: false
  - key: AGENCY_VIEWER_HOST
    sync: false
  - key: KLYPSO_FRONTEND_URL
    sync: false
  - key: KLYPSO_BACKEND_PORT
    sync: false
  - key: KLYPSO_FRONTEND_PORT
    sync: false
  - key: AGENCY_BACKEND_PORT
    sync: false
  - key: NEXUS_BACKEND_PORT
    sync: false
  - key: NEXUS_BACKEND_HOST
    sync: false
  - key: NEXUS_FRONTEND_PORT
    sync: false
  - key: AGENCY_VIEWER_PORT
    sync: false
  - key: NEXUS_FRONTEND_HOST
    sync: false
  - key: PORT
    sync: false
  region: oregon
  dockerContext: .
  dockerfilePath: ./Dockerfile
  domains:
  - www.klypso.in
  - klypso.in
  autoDeployTrigger: "off"
  rootDir: gateway
- type: web
  name: klypso-agency-viewer
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: NEXT_PUBLIC_API_URL
    sync: false
  - key: PORT
    sync: false
  region: oregon
  buildCommand: npm install && npm run build
  startCommand: npx serve -s dist -l $PORT
  healthCheckPath: /
  autoDeployTrigger: "off"
  rootDir: agency/client
- type: web
  name: klypso-backend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: CLOUDINARY_CLOUD_NAME
    sync: false
  - key: DATABASE_URL
    sync: false
  - key: DIRECT_URL
    sync: false
  - key: CLOUDINARY_API_SECRET
    sync: false
  - key: CLOUDINARY_API_KEY
    sync: false
  - key: KLYPSO_FRONTEND_URL
    sync: false
  - key: RESEND_API_KEY
    sync: false
  - key: NEXUS_FRONTEND_URL
    sync: false
  - key: PORT
    sync: false
  - key: JWT_SECRET
    sync: false
  region: oregon
  buildCommand: npm install && npx prisma generate && npm run build
  startCommand: npx prisma migrate deploy || true && node dist/backend/src/main.js
  healthCheckPath: /api/v1/health/liveness
  autoDeployTrigger: "off"
  rootDir: nexus/backend
- type: web
  name: klypso-frontend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: PORT
    sync: false
  - key: HOSTNAMEs
    sync: false
  - key: KLYPSO_BACKEND_URL
    sync: false
  region: oregon
  buildCommand: cd .. && npm install && cd frontend && npm run build
  startCommand: npx next start -H 0.0.0.0 -p 10000
  autoDeployTrigger: "off"
  rootDir: nexus/frontend
- type: web
  name: klypso-agency-backend
  runtime: node
  repo: https://github.com/Adityavanjre/ERP
  plan: free
  envVars:
  - key: PORT
    sync: false
  - key: MONGO_URI
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: ADMIN_PASSWORD
    sync: false
  region: oregon
  buildCommand: npm install
  startCommand: node index.js
  healthCheckPath: /
  autoDeployTrigger: "off"
  rootDir: agency/server
- type: web
  name: klypso-agency-frontend
  runtime: static
  repo: https://github.com/Adityavanjre/ERP
  buildCommand: npm install && npm run build
  staticPublishPath: dist
  autoDeployTrigger: "off"
  rootDir: agency/client