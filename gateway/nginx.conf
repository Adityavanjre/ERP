events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Resolver for Public DNS (Google)
        resolver 8.8.8.8 valid=30s;

        # 🚀 Klypso Agency Website (Root)
        location / {
            # Public URL: klypso-agency-viewer containing verified URL
            proxy_pass https://klypso-agency-viewer.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-agency-viewer.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Nexus ERP Portal
        location /portal/ {
            # Public URL: nexus-frontend-gz8c
            proxy_pass https://nexus-frontend-gz8c.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-frontend-gz8c.onrender.com; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Nexus Engine API (Direct Access if needed)
        location /portal/api/ {
            # Public URL: nexus-backend-3ukg
            proxy_pass https://nexus-backend-3ukg.onrender.com/api/;
            proxy_ssl_server_name on;
            proxy_set_header Host nexus-backend-3ukg.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            # Assumption: klypso-agency-backend follows same pattern
            proxy_pass https://klypso-agency-backend.onrender.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-agency-backend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
