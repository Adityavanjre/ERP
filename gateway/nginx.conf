events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Use Docker's internal DNS resolver to handle dynamic upstreams
        resolver 127.0.0.11 valid=30s ipv6=off;

        # 🚀 Klypso Agency Website (Root)
        location / {
            set $agency_viewer_upstream http://klypso-agency-viewer:5000;
            proxy_pass $agency_viewer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Nexus ERP Portal
        location /portal/ {
            set $nexus_frontend_upstream http://nexus-frontend:3000;
            proxy_pass $nexus_frontend_upstream; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Nexus Engine API (Direct Access if needed)
        location /portal/api/ {
            set $nexus_backend_upstream http://nexus-backend:3001;
            proxy_pass $nexus_backend_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            set $agency_backend_upstream http://klypso-agency-backend:5000;
            proxy_pass $agency_backend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
