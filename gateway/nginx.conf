events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Resolver for Public DNS (Google)
        resolver 8.8.8.8 valid=30s;

        # 🚀 Klypso Agency Website (Root)
        location / {
            # Public URL: klypso-agency-viewer
            proxy_pass https://klypso-agency-viewer.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-agency-viewer.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Klypso ERP Portal
        location ^~ /portal {
            # Public URL: klypso-frontend
            proxy_pass https://klypso-frontend.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-frontend.onrender.com; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Klypso Engine API
        location ^~ /portal/api {
            # Public URL: klypso-backend
            proxy_pass https://klypso-backend.onrender.com/api;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-backend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            # Assumption: klypso-agency-backend follows same pattern
            proxy_pass https://klypso-agency-backend.onrender.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host klypso-agency-backend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
