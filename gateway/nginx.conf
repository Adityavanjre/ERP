events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # 🚀 Klypso Agency Website (Root)
        location / {
            proxy_pass http://klypso-agency-viewer:5000; # Managed by Render Private Network
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Nexus ERP Portal
        location /portal/ {
            proxy_pass http://nexus-frontend:3000; # basePath handles the /portal prefix
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Nexus Engine API (Direct Access if needed)
        location /portal/api/ {
            proxy_pass http://nexus-backend:3001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            proxy_pass http://klypso-agency-backend:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
