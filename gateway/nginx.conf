events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Internal DNS resolver (Render handles this automatically via system DNS)
        # We use a variable to prevent Nginx from crashing if host is not found at startup.
        resolver 8.8.8.8 127.0.0.11 valid=30s;

        # Define internal targets as variables
        set $agency_viewer_port ${AGENCY_VIEWER_PORT};
        set $erp_frontend_port ${KLYPSO_FRONTEND_PORT};
        set $erp_backend_port ${KLYPSO_BACKEND_PORT};
        set $agency_backend_port ${AGENCY_BACKEND_PORT};

        # 🚀 Klypso Agency Website (Root)
        location / {
            proxy_pass http://$agency_viewer_upstream:$agency_viewer_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🎨 Klypso ERP Portal
        location ^~ /portal {
            proxy_pass http://$erp_frontend_upstream:$erp_frontend_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Klypso Engine API
        location ^~ /portal/api/ {
            rewrite ^/portal/api/(.*)$ /api/$1 break;
            proxy_pass http://$erp_backend_upstream:$erp_backend_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # 🏢 Agency API (Relative to Root)
        location ^~ /api/agency/ {
            rewrite ^/api/agency/(.*)$ /api/$1 break;
            proxy_pass http://$agency_backend_upstream:$agency_backend_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
