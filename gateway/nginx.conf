events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    server {
        listen 80;
        server_name localhost;

        # Resolver for Internal Render Discovery
        resolver 127.0.0.11 valid=30s;

        # 🚀 Klypso Agency Website (Root)
        location / {
            # Internal URL: No extra letters needed here
            proxy_pass http://klypso-agency-viewer:10000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Klypso ERP Portal
        location ^~ /portal {
            # Internal URL: Frontend on port 3000
            proxy_pass http://klypso-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Klypso Engine API
        location ^~ /portal/api {
            # Internal URL: Backend on port 3001
            proxy_pass http://klypso-backend:3001/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            proxy_pass http://klypso-agency-backend:10000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
