events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Resolver will be injected by start.sh from /etc/resolv.conf
        resolver __DNS_RESOLVER__ valid=10s;

        # 🚀 Klypso Agency Website (Root)
        location / {
            set $upstream_agency_viewer http://klypso-agency-viewer:5000;
            proxy_pass $upstream_agency_viewer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🎨 Nexus ERP Portal
        location /portal/ {
            set $upstream_nexus_frontend http://nexus-frontend:3000;
            proxy_pass $upstream_nexus_frontend; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 🐘 Nexus Engine API (Direct Access if needed)
        location /portal/api/ {
            set $upstream_nexus_backend http://nexus-backend:3001;
            proxy_pass $upstream_nexus_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 🏢 Agency API (Relative to Root)
        location /api/agency/ {
            set $upstream_agency_backend http://klypso-agency-backend:5000;
            proxy_pass $upstream_agency_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
